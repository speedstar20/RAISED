<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Raised - Responsive</title>
  <style>
    /* Reset & basics */
 *{
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body{
    font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen,
    Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
    background-color: black;
    color: #e7e7e7;
    min-height: 100vh;
    line-height: 1.5;
    background-size: cover;
}

/* GRADIENT AND LAYER BLUR EFFECT */

.image-gradient{
    background-size: cover;
    height: 100%;
    margin: 0;
    position: absolute;
    top: 0;
    right: 0;
    opacity: 0.5;
    z-index: -1;
}

.layer-blur{
    height: 0;
    width: 30rem;
    position: absolute;
    top: 20%;
    box-shadow: 0 0 700px 15px white;
    rotate: -30deg;
    z-index: -1;
}

.container{
    width: 100%;
    margin: 0 auto;
    padding: 0 2rem;
    position: relative;
    overflow: hidden;
}

header{
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 1rem 5rem;
}

header h1{
    margin: 0;
    font-size: 3rem;
    font-weight: 300;
}

nav{
    display: flex;
    align-items: center;
    gap: 3rem;
    margin-left: -5%;
}

nav a {
    font-size: 1rem;
    letter-spacing: 0.1rem;
    transition: color 0.2s ease;
    text-decoration: none;
    color: inherit;
    z-index: 999;
}

nav a:hover{
    color: aliceblue;
}

.btn-signing{
    background-color: #a7a7a7;
    color: black;
    padding: 0.8rem 2rem;
    border-radius: 50px;
    border: none;
    font-size: 1rem;
    font-weight: 500;
    transition: background-color 0.2s ease;
    cursor: pointer;
    z-index: 999;
}

.btn-signing:hover {
    background-color: white;
}

/* main content */
main{
    display: flex;
    flex-direction: column;
    justify-content: center;
    min-height: calc(90vh - 6rem);
}

.content{
    max-width: 40rem;
    margin-left: 10%;
    z-index: 999;
}

.tag-box{
    position: relative;
    width: 18rem;
    height: 2.5rem;
    border-radius: 50px;
    background: linear-gradient(to right, #656565, #7f42a7, #6600c5,
    #5300a0, #757575, #656565);
    background-size: 200%;
    animation: animationGradient 2.5s linear infinite;
    box-shadow: 0 0 15px rgba(255, 255, 255, 0.3);
}

@keyframes animationGradient {
    to{
        background-position: 200%;
    }
}

.tag-box .tag{
    position: absolute;
    inset: 3px 3px 3px 3px;
    background-color: black;
    border-radius: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.5s ease;
    cursor: pointer;
}

.tag-box .tag:hover{
    color: #5300a0;
}

.content h1{
    font-size: 4rem;
    font-weight: 600;
    letter-spacing: 0.1rem;
    margin: 2rem 0;
    line-height: 1.2;
    text-shadow: 0 0 10px rgba(128, 128, 128, 0.418);
}

.description{
    font-size: 1.2rem;
    letter-spacing: 0.05rem;
    max-width: 35rem;
    color: grey;
}

.buttons {
    display: flex;
    gap: 1rem;
    margin-top: 3rem;
}

/* Glowing border effect for Get Started */
.btn-get-started{
    text-decoration: none;
    border: 2px solid #7f42a7;
    padding: 0.7rem 1.2rem;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    color: #e7e7e7;
    animation: glow 2s ease-in-out infinite alternate;
    transition: background-color 0.2s ease;
}

@keyframes glow {
    from {
        box-shadow: 0 0 5px #7f42a7, 0 0 10px #7f42a7, 0 0 20px #7f42a7;
    }
    to {
        box-shadow: 0 0 20px #a56be8, 0 0 30px #a56be8, 0 0 40px #a56be8;
    }
}

.btn-get-Main {
    text-decoration: none;
    background-color: lightgray;
    color: black;
    padding: 0.6rem 2.5rem;
    border-radius: 50px;
    font-size: 1.2rem;
    font-weight: 600;
    letter-spacing: 0.1em;
    transition: background-color 0.2s ease;
}

.btn-get-Main:hover{
    background-color: #1a1a1a;
}

.robot-3d{
    position: absolute;
    top: 0;
    right: -20%;
}

/*tablet*/
@media (max-width: 768px){
    header{
        padding: 1rem 0.5rem;
    }

    .content{
        margin-top: 85%;
        margin-left: 5%;
    }

    .robot-3d{
        scale: 0.8;
        top: -20%;
        right: 2%;
    }
}

/*mobile*/
@media (max-width: 768px){
    header{
        padding: 1rem 0.1rem;
    }

    nav{
        display: none;
    }

    header h1{
        font-size: 2rem;
    }

    .btn-signing{
        padding: 0.6rem 1.5rem;
    }

    .content{
        max-width: 90%;
        margin-left: 5%;
        margin-top: 10rem;
    }

    .tag-box{
        width: 12rem;
        margin-right: 0;
    }

    .content h1{
        font-size: 2.5rem;
    }

    .description{
        font-size: 1rem;
    }

    .btn-get-main {
        font-size: 1rem;
        padding: 0.5rem 1rem;
    }

    .robot-3d{
        scale: 0.5;
        top: -25%;
        right: 0;
    }
}


  </style>

  <link rel="stylesheet" href="https://unpkg.com/aos@next/dist/aos.css" />
</head>
<body>
  <img
    class="image-gradient"
    src="/background.jpg"
    alt="gradient background"
  />
  <div class="layer-blur"></div>

  <div class="container">
    <header>
      <h1 data-aos="fade-down" data-aos-duration="1500" class="logo">Raised</h1>
      <nav>
        <a data-aos="fade-down" data-aos-duration="1500" href="/blog.html" style="text-decoration: none;">BLOG</a>
        <a data-aos="fade-down" data-aos-duration="2000" href="#">FEATURE</a>
        <a data-aos="fade-down" data-aos-duration="2500" href="#">RESOURCES</a>
      </nav>

      <button
        data-aos="fade-down" data-aos-duration="1500" class="btn-signing" type="button">
        <a href="/login.html" style="text-decoration: none;">LOGIN</a>
      </button>
    </header>

    <main>
      <div class="content">
        <div class="tag-box" role="button" tabindex="0">
          <div class="tag">INTRODUCING &wedbar;</div>
        </div>

        <h1>Email For <br />Developer</h1>

        <p class="description">
          The best way to reach Humans instead of spam folders, deliver
          transaction and marketing email at scale.
        </p>

        <div class="buttons">
          <a href="#" class="btn-get-started">Documentation</a>
          <a href="#" class="btn-get-Main">Get started</a>
        </div>
      </div>
    </main>

    <spline-viewer
      class="robot-3d"
      url="https://prod.spline.design/Pet6oGPGVmxck2Di/scene.splinecode"
    ></spline-viewer>
  </div>

  <script type="module" src="https://unpkg.com/@splinetool/viewer@1.10.15/build/spline-viewer.js"></script>

  <script src="https://unpkg.com/aos@next/dist/aos.js"></script>
  <script>
    AOS.init();
  </script>
</body>
</html>
